name: Release

# Release runs only after CI has succeeded on main. The version-tag-exists
# check gates publishing, so pushes that don't bump `ragrag.__version__`
# are cheap no-ops.

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Publish release
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Resolve head SHA
        id: sha
        run: |
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            echo "sha=${{ github.event.workflow_run.head_sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ steps.sha.outputs.sha }}

      - name: Read __version__
        id: version
        run: |
          ver=$(python -c "import re,pathlib; print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', pathlib.Path('ragrag/__init__.py').read_text()).group(1))")
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Detected version: $ver"

      - name: Skip if tag already exists
        id: gate
        run: |
          tag="v${{ steps.version.outputs.version }}"
          git fetch --tags --quiet
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists - nothing to release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $tag is new - releasing."
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.gate.outputs.skip != 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Build wheel and sdist
        if: steps.gate.outputs.skip != 'true'
        run: |
          pip install build
          python -m build
          ls -la dist/

      - name: Publish to PyPI
        if: steps.gate.outputs.skip != 'true'
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

      - name: Create git tag and GitHub release
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.version.outputs.version }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          gh release create "v${VERSION}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "v${VERSION}" \
            --target "${SHA}" \
            --notes "Automated release for v${VERSION}." \
            dist/*

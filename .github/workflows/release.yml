name: Release

on:
  push:
    branches: [main]
    paths:
      - "ragrag/__init__.py"
      - ".github/workflows/release.yml"
  workflow_dispatch:

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  check:
    name: Check for new version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      should_release: ${{ steps.check.outputs.should_release }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read __version__
        id: version
        run: |
          ver=$(python -c "import re,pathlib; print(re.search(r'__version__\s*=\s*\"([^\"]+)\"', pathlib.Path('ragrag/__init__.py').read_text()).group(1))")
          echo "version=$ver" >> "$GITHUB_OUTPUT"
          echo "Detected version: $ver"

      - name: Check whether tag already exists
        id: check
        run: |
          tag="v${{ steps.version.outputs.version }}"
          git fetch --tags --quiet
          if git rev-parse "refs/tags/$tag" >/dev/null 2>&1; then
            echo "Tag $tag already exists - no release needed."
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "Tag $tag is new - releasing."
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    name: Build distribution
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"

      - name: Install build tooling
        run: pip install build

      - name: Build wheel and sdist
        run: python -m build

      - name: Show artifacts
        run: ls -la dist/

      - name: Upload distribution artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: [check, build]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_API_TOKEN }}

  tag:
    name: Push git tag
    needs: [check, publish]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create and push tag
        env:
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${VERSION}" -m "Release v${VERSION}"
          git push origin "v${VERSION}"

  release:
    name: Create GitHub release
    needs: [check, tag]
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download distribution artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          gh release create "v${VERSION}" \
            --repo "${GITHUB_REPOSITORY}" \
            --title "v${VERSION}" \
            --notes "Automated release for v${VERSION}. See commits on main for changes." \
            dist/*
